<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Registration Form</title>
</head>
<body>
    <h1>Patient Registration Form</h1>
    <p>Please fill out the form below to register as a new patient.</p>
    <form action="/submit" method="POST">
    <label for="first-name">First Name *</label>
    <input type="text" id="first-name" name="first_name" required>

    <label for="last-name">Last Name *</label>
    <input type="text" id="last-name" name="last_name" required>

    <label for="dob">Date of Birth *</label>
    <input type="date" id="dob" name="dob" required><br><br>

    <label for="gender">Gender *</label>
    <label><input type="radio" name="gender" value="male" required> Male</label>
    <label><input type="radio" name="gender" value="female" required> Female</label>
    <label><input type="radio" name="gender" value="other" required> Other</label><br><br>

    <label for="phone">Phone Number *</label>
    <input type="tel" id="phone" name="phne" required><br><br>

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required><br><br>

    <label for="county of residence">county of residence</label>
    <input type="text" id="county of residence" name="county of residence"><br><br>

    <label for="additional comments">additional comments</label><br>
    <textarea id="additional comments" name="additional comments" rows="4" cols="50"></textarea><br><br>

    <label for="submit and restart">submit and restart</label>
    <button type="submit">submit</button>

    </form>
</body>
</html>
